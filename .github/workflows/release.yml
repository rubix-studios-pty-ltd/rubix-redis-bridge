name: Docker Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag to publish, for example v0.1.0"
        required: true
        type: string

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE }}

jobs:
  validate:
    name: Validate before release
    runs-on: ubuntu-24.04

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      RRB_MODE: env
      RRB_HOST: 127.0.0.1
      RRB_PORT: 8080
      RRB_TOKEN: test-bridge-token
      RRB_CONNECTION_STRING: redis://127.0.0.1:6379
      RRB_ALLOWED_COMMANDS: PING,GET,SET,DEL,EXISTS,EXPIRE,TTL,INCR,DECR,HGET,HSET,HDEL,HMGET,HGETALL
      RRB_REQUEST_TIMEOUT_MS: 5000
      RRB_TEST_URL: http://127.0.0.1:8080

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --locked

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install SDK test dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release binary
        run: cargo build --locked --release --bin rubix-redis-bridge

      - name: Start bridge
        run: |
          ./target/release/rubix-redis-bridge > rrb.log 2>&1 &
          echo $! > rrb.pid

          for i in {1..60}; do
            if ! kill -0 "$(cat rrb.pid)" 2>/dev/null; then
              echo "Bridge process exited early"
              cat rrb.log
              exit 1
            fi

            if curl -fsS "$RRB_TEST_URL/healthz"; then
              echo "Bridge is alive"
              exit 0
            fi

            sleep 1
          done

          echo "Bridge failed to start"
          echo "Open ports:"
          ss -ltnp || true
          echo "Bridge log:"
          cat rrb.log
          exit 1

      - name: Run SDK compatibility tests
        run: pnpm test:sdk

      - name: Stop bridge
        if: always()
        run: |
          if [ -f rrb.pid ]; then
            kill "$(cat rrb.pid)" || true
          fi

      - name: Print bridge logs on failure
        if: failure()
        run: |
          if [ -f rrb.log ]; then
            cat rrb.log
          fi

  docker:
    name: Publish Docker image
    runs-on: ubuntu-24.04
    needs: validate

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Docker Hub image variable
        run: |
          if [ -z "${IMAGE_NAME}" ]; then
            echo "Repository variable DOCKERHUB_IMAGE is required."
            echo "Example: rubixstudios/rubix-redis-bridge"
            exit 1
          fi

      - name: Set release version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi

          VERSION="${VERSION#refs/tags/}"

          if [[ ! "$VERSION" =~ ^v[0-9]+(\.[0-9]+){1,2}([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version tag: $VERSION"
            echo "Expected format like v0.1.0"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "semver=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.semver }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Rubix Redis Bridge
            org.opencontainers.image.description=Secure Rust HTTP bridge for Redis with Upstash-style API compatibility
            org.opencontainers.image.source=https://github.com/rubix-studios-pty-ltd/rubix-redis-bridge
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
